<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="自行車租賃管理系統 — 提供客戶管理、設備庫存、訂單管理等完整功能">
  <title>🚲 自行車租賃管理系統</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ============================================
       側邊欄導航
       ============================================ -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon">🚲</div>
        <div class="logo-text">
          <span class="brand">BikeRental</span>
          <span class="tagline">租賃管理系統</span>
        </div>
      </div>
    </div>

    <nav>
      <div class="nav-section-title">資料管理</div>
      <a href="#" data-page="customer" class="active" id="nav-customer">
        <span class="nav-icon">👤</span>
        <span class="nav-label">客戶管理</span>
      </a>
      <a href="#" data-page="equipment" id="nav-equipment">
        <span class="nav-icon">🚲</span>
        <span class="nav-label">設備管理</span>
      </a>

      <div class="nav-section-title">營運管理</div>
      <a href="#" data-page="order" id="nav-order">
        <span class="nav-icon">📋</span>
        <span class="nav-label">訂單管理</span>
      </a>
      <a href="#" data-page="detail" id="nav-detail">
        <span class="nav-icon">📝</span>
        <span class="nav-label">明細管理</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      MVC Architecture &bull; LocalStorage
    </div>
  </aside>

  <!-- ============================================
       主要內容區
       ============================================ -->
  <main class="content">
    <div id="page-container"></div>
  </main>

  <!-- ============================================
       Modal 對話框
       ============================================ -->
  <div class="modal-overlay hidden" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">標題</h2>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer">
        <button class="btn btn-cancel" id="modal-cancel">取消</button>
        <button class="btn btn-primary" id="modal-submit">確認送出</button>
      </div>
    </div>
  </div>

  <!-- ============================================
       Toast 通知容器
       ============================================ -->
  <div class="toast-container" id="toast-container"></div>

  <!-- ============================================
       JavaScript — MVC 架構
       載入順序：Model → View → Controller → App
       ============================================ -->
  <!-- Model 層 -->
  <script src="js/models/CustomerModel.js"></script>
  <script src="js/models/EquipmentModel.js"></script>
  <script src="js/models/OrderModel.js"></script>
  <script src="js/models/OrderDetailModel.js"></script>

  <!-- View 層 -->
  <script src="js/views/CustomerView.js"></script>
  <script src="js/views/EquipmentView.js"></script>
  <script src="js/views/OrderView.js"></script>
  <script src="js/views/OrderDetailView.js"></script>

  <!-- Controller 層 -->
  <script src="js/controllers/CustomerController.js"></script>
  <script src="js/controllers/EquipmentController.js"></script>
  <script src="js/controllers/OrderController.js"></script>
  <script src="js/controllers/OrderDetailController.js"></script>

  <!-- 應用程式進入點 -->
  <script src="js/app.js"></script>

</body>
</html>
